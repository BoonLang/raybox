<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=700,height=700" />
  <title>TodoMVC Physical (Emergent Draft)</title>
  <style>
    :root {
      --bg: #f4f3f1;
      --card: #fff;
      --accent: #b83f45;
      --shadow-soft: 0 20px 50px rgba(0,0,0,0.15);
      --shadow-hard: 0 4px 8px rgba(0,0,0,0.20);
      --inset: inset 0 -2px 4px rgba(0,0,0,0.06);
      --depth: 8px;
      --radius: 4px;
      --text: #2b2b2b;
      --muted: #888;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 700px;
      height: 700px;
      background: var(--bg);
      font-family: 'Helvetica Neue', Arial, sans-serif;
      color: var(--text);
    }
    .wrap {
      position: relative;
      width: 700px;
      height: 700px;
      overflow: hidden;
    }
    h1 {
      margin: 0;
      padding: 0;
      text-align: center;
      font-size: 72px;
      font-weight: 200;
      color: var(--accent);
      letter-spacing: -1px;
      position: absolute;
      top: 30px;
      width: 100%;
    }
    .card {
      width: 550px;
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      top: 130px;
      background: var(--card);
      box-shadow: var(--shadow-soft), var(--shadow-hard);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .input-row {
      height: 65px;
      display: flex;
      align-items: center;
      padding: 0 16px 0 16px;
      background: var(--card);
      box-shadow: var(--inset);
      position: relative;
    }
    .input-row .toggle-all {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid #c9c9c9;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 18px;
      color: #c9c9c9;
      font-size: 18px;
    }
    .input-row input {
      flex: 1;
      font-size: 24px;
      border: none;
      outline: none;
      background: transparent;
      color: #b2b2b2;
      font-style: italic;
    }
    .todo-list {
      list-style: none;
      margin: 0;
      padding: 0;
    }
    .todo-list li {
      display: flex;
      align-items: center;
      height: 60px;
      border-top: 1px solid #ededed;
      padding: 0 16px;
      background: #fff;
    }
    .todo-list li:first-child { border-top: none; }
    .checkbox {
      width: 26px;
      height: 26px;
      border: 2px solid #d2d2d2;
      border-radius: 50%;
      margin-right: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: #6fc4a1;
    }
    .checked { border-color: #6fc4a1; }
    .label { font-size: 24px; }
    .completed .label { color: #a0a0a0; text-decoration: line-through; }
    .footer {
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      font-size: 14px;
      color: #777;
      border-top: 1px solid #ededed;
    }
    .filters a {
      margin: 0 4px;
      padding: 4px 8px;
      border-radius: 3px;
      border: 1px solid transparent;
      text-decoration: none;
      color: #777;
      font-size: 14px;
    }
    .filters a.selected { border-color: #ce4646; color: #444; }
    .info {
      text-align: center;
      font-size: 12px;
      color: #7c7c7c;
      margin-top: 40px;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>todos</h1>
    <div class="card">
      <div class="input-row">
        <div class="toggle-all">▾</div>
        <input placeholder="What needs to be done?" aria-label="New todo" />
      </div>
      <ul class="todo-list">
        <li>
          <div class="checkbox"></div>
          <div class="label">Buy groceries</div>
        </li>
        <li>
          <div class="checkbox"></div>
          <div class="label">Walk the dog</div>
        </li>
        <li class="completed">
          <div class="checkbox checked">✓</div>
          <div class="label">Finish TodoMVC renderer</div>
        </li>
        <li>
          <div class="checkbox"></div>
          <div class="label">Read documentation</div>
        </li>
      </ul>
      <div class="footer">
        <div>3 items left</div>
        <div class="filters">
          <a href="#" class="selected">All</a>
          <a href="#">Active</a>
          <a href="#">Completed</a>
          <a href="#">Clear completed</a>
        </div>
      </div>
    </div>
    <div class="info">
      <div>Double-click to edit a todo</div>
      <div>Created by the TodoMVC Team</div>
      <div>Part of TodoMVC</div>
    </div>
  </div>
</body>
</html>
