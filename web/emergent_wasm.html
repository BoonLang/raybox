<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=700,height=700">
    <title>TodoMVC Emergent (placeholder)</title>
    <style>
        body { margin: 0; padding: 0; background: #f4f3f1; }
        #canvas { width: 700px; height: 700px; display: block; }
    </style>
</head>
<body>
    <canvas id="canvas" width="700" height="700"></canvas>
    <script type="module">
        async function init() {
            const resp = await fetch('/reference/layouts/layout.json');
            const layoutJson = await resp.text();

            try {
                // When built with wasm-start --renderer emergent, outputs emergent_renderer.js
                const wasm = await import('./pkg/emergent_renderer.js');
                await wasm.default();

                // Signal that WebGPU is initializing
                window.__emergent_webgpu_ok = false;

                // The emergent renderer exports start_renderer (not start_emergent_renderer)
                await wasm.start_renderer('canvas');

                // Signal successful initialization
                window.__emergent_webgpu_ok = true;
                console.log('Emergent renderer initialized successfully');
            } catch (err) {
                console.error('Emergent WebGPU failed:', err);
                window.__emergent_webgpu_ok = false;
            }
        }
        init();
    </script>
</body>
</html>
