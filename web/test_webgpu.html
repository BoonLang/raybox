<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebGPU Verification Test</title>
  <style>
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
    }
    #status {
      padding: 20px;
      margin: 20px 0;
      border-radius: 8px;
      font-weight: bold;
      font-size: 18px;
    }
    #status.pending {
      background: #fff3cd;
      color: #856404;
    }
    #status.success {
      background: #d4edda;
      color: #155724;
    }
    #status.warning {
      background: #fff3cd;
      color: #856404;
    }
    #status.error {
      background: #f8d7da;
      color: #721c24;
    }
    #results {
      background: white;
      padding: 20px;
      border-radius: 8px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      white-space: pre-wrap;
      line-height: 1.6;
    }
    .pass { color: #28a745; }
    .fail { color: #dc3545; }
    .warn { color: #ffc107; }
    .info { color: #17a2b8; }
  </style>
</head>
<body>
  <h1>WebGPU Verification Test</h1>
  <div id="status" class="pending">Testing WebGPU availability...</div>
  <div id="results"></div>

  <script>
    async function testWebGPU() {
      const statusEl = document.getElementById('status');
      const resultsEl = document.getElementById('results');
      let log = '';

      function append(msg, className = '') {
        const span = `<span class="${className}">${msg}</span>`;
        log += span + '\n';
        resultsEl.innerHTML = log;
      }

      try {
        append('=== WebGPU Verification Test ===\n', 'info');
        append(`URL: ${window.location.href}`, 'info');
        append(`User Agent: ${navigator.userAgent.split(' ').slice(-2).join(' ')}`, 'info');
        append(`Device Pixel Ratio: ${window.devicePixelRatio}`, 'info');
        append('');

        // Test 1: Check navigator.gpu
        append('[1/4] Checking navigator.gpu...', 'info');
        if (!('gpu' in navigator)) {
          statusEl.textContent = '❌ FAIL: WebGPU not available';
          statusEl.className = 'status error';
          append('      ❌ FAIL: navigator.gpu is undefined', 'fail');
          append('');
          append('WebGPU is not enabled in this browser!', 'fail');
          append('');
          append('💡 Launch Chrome with:', 'warn');
          append('   --enable-unsafe-webgpu', 'warn');
          append('   --enable-webgpu-developer-features', 'warn');
          append('');
          append('See docs/CHROME_SETUP.md for full setup', 'info');
          return;
        }
        append('      ✅ PASS: navigator.gpu is defined', 'pass');
        append('');

        // Test 2: Request adapter
        append('[2/4] Requesting GPU adapter...', 'info');
        const adapter = await navigator.gpu.requestAdapter({
          powerPreference: 'high-performance'
        });

        if (!adapter) {
          statusEl.textContent = '❌ FAIL: No GPU adapter';
          statusEl.className = 'status error';
          append('      ❌ FAIL: requestAdapter() returned null', 'fail');
          append('');
          append('No compatible WebGPU adapter found!', 'fail');
          append('This usually means:', 'warn');
          append('  - GPU drivers are not installed', 'warn');
          append('  - Vulkan is not working', 'warn');
          append('  - Chrome blocklisted your GPU', 'warn');
          append('');
          append('💡 Debug steps:', 'info');
          append('  1. Check chrome://gpu', 'info');
          append('  2. Run: vulkaninfo | grep GPU', 'info');
          append('  3. See docs/CHROME_SETUP.md', 'info');
          return;
        }

        append('      ✅ PASS: Got adapter', 'pass');
        append(`         Type: ${adapter.constructor?.name || 'GPUAdapter'}`, 'info');

        // Test 3: Check if fallback
        append('');
        append('[3/4] Checking adapter type...', 'info');
        const isFallback = adapter.isFallbackAdapter;
        append(`      Fallback adapter: ${isFallback}`, isFallback ? 'warn' : 'pass');

        if (isFallback) {
          statusEl.textContent = '⚠️  WARNING: Using CPU renderer';
          statusEl.className = 'status warning';
          append('');
          append('⚠️  WARNING: This is a software (CPU) adapter!', 'warn');
          append('    Performance will be TERRIBLE.', 'warn');
          append('    Your renderer will melt the CPU.', 'warn');
          append('');
          append('💡 This usually means:', 'warn');
          append('  - No GPU detected by Chrome', 'warn');
          append('  - Vulkan drivers not working', 'warn');
          append('  - Running in VM without GPU passthrough', 'warn');
          append('');
          append('Do NOT proceed with development!', 'fail');
          append('Fix your GPU setup first.', 'fail');
          append('');
          append('See docs/CHROME_SETUP.md for troubleshooting', 'info');
          return;
        }

        append('      ✅ PASS: Hardware GPU adapter', 'pass');

        // Test 4: Request device
        append('');
        append('[4/4] Requesting GPU device...', 'info');
        const device = await adapter.requestDevice();
        append('      ✅ PASS: Got device', 'pass');
        append(`         Type: ${device.constructor?.name || 'GPUDevice'}`, 'info');

        // Success!
        append('');
        append('=================================', 'pass');
        append('🎉 ALL TESTS PASSED!', 'pass');
        append('=================================', 'pass');
        append('');
        append('WebGPU is working correctly.', 'pass');
        append('GPU rendering enabled.', 'pass');
        append('You are ready to develop!', 'pass');
        append('');
        append('Next steps:', 'info');
        append('  1. Extract DOM layout data', 'info');
        append('     See: docs/DOM_EXTRACTION.md', 'info');
        append('  2. Start implementing renderer', 'info');
        append('     See: specs.md', 'info');

        statusEl.textContent = '✅ SUCCESS: WebGPU is ready!';
        statusEl.className = 'status success';

      } catch (error) {
        statusEl.textContent = '❌ ERROR: Test failed';
        statusEl.className = 'status error';
        append('');
        append('❌ ERROR: ' + error.message, 'fail');
        append('');
        append('Stack trace:', 'info');
        append(error.stack || 'No stack trace available', 'info');
        console.error('WebGPU test error:', error);
      }
    }

    // Run test on load
    testWebGPU();
  </script>
</body>
</html>
