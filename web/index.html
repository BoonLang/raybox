<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMVC - Raybox WebGPU Renderer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
        }

        h1 {
            font-size: 100px;
            font-weight: 100;
            color: rgba(175, 47, 47, 0.15);
            margin: 20px 0;
        }

        #canvas {
            display: block;
            width: 700px;
            height: 700px;
            outline: 1px solid #ddd;
            background: white;
        }

    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="700" height="700"></canvas>
    </div>

    <!-- Live Reload (dev mode) -->
    <script>
        // Log page load
        console.log('🚀 Page loaded at ' + new Date().toLocaleTimeString());

        // Poll for build changes and reload
        let lastBuildId = null;

        async function checkReload() {
            try {
                const response = await fetch('/_api/build_id');
                if (response.ok) {
                    const buildId = await response.text();
                    if (lastBuildId === null) {
                        lastBuildId = buildId;
                        console.log('📦 Initial build ID: ' + buildId);
                    } else if (lastBuildId !== buildId) {
                        console.log('🔄 Build updated (old: ' + lastBuildId + ', new: ' + buildId + '), reloading...');
                        location.reload();
                    }
                }
            } catch (e) {
                // Server might not be running (production), ignore
            }
        }

        // Check every second
        setInterval(checkReload, 1000);
        checkReload();
    </script>

    <script type="module">
        async function init() {
            try {
                window.__boot = 'yes';
                // Load layout JSON first (needed for headless capture even if GPU is missing)
                const response = await fetch('/reference/todomvc_dom_layout_700.json?v=20251126_2');
                if (!response.ok) {
                    throw new Error(`Failed to load layout JSON: ${response.statusText}`);
                }
                const layoutJson = await response.text();
                let parsedLayout;
                try {
                    parsedLayout = JSON.parse(layoutJson);
                } catch (e) {
                    console.warn('layout parse failed', e);
                }

                if (!parsedLayout || !parsedLayout.elements || parsedLayout.elements.length < 2) {
                    throw new Error('layout JSON missing root/body');
                }
                const html = parsedLayout.elements[0];
                const body = parsedLayout.elements[1];
                if (!(html.height > 0 && html.height < 650 && body.y === 130 && body.height > 450 && body.height < 500)) {
                    throw new Error(`layout sanity failed: html_h=${html.height} body_y=${body.y} body_h=${body.height}`);
                }

                const sanitizedLayoutJson = JSON.stringify(parsedLayout);
                window.__layout_json = sanitizedLayoutJson;
                window.__sanitized_layout = sanitizedLayoutJson;
                window.__layout_json_file_html_height = html.height;
                window.__layout_json_file_body_height = body.height;
                console.log('layout first element height', html.height);

                // Load WASM module
                const { default: init, start_renderer, raybox_report_json } = await import('./pkg/renderer.js');

                // Initialize WASM
                await init();
                // Expose render report for automation
                window.raybox_report_json = raybox_report_json;

                // Start renderer (report becomes available once this completes)
                await start_renderer('canvas', sanitizedLayoutJson);
            } catch (error) {
                console.error('Initialization error:', error);
                window.__layout_error = String(error);
            }
        }

        init();
    </script>
</body>
</html>
