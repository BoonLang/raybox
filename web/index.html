<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TodoMVC - Canvas WebGPU Renderer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        #container {
            position: absolute;
            top: 0;
            left: 0;
        }

        h1 {
            font-size: 100px;
            font-weight: 100;
            color: rgba(175, 47, 47, 0.15);
            margin: 20px 0;
        }

        #canvas {
            display: block;
            width: 700px;
            height: 700px;
            outline: 1px solid #ddd;
            background: white;
        }

    </style>
</head>
<body>
    <div id="container">
        <canvas id="canvas" width="700" height="700"></canvas>
    </div>

    <!-- Live Reload (dev mode) -->
    <script>
        // Log page load
        console.log('🚀 Page loaded at ' + new Date().toLocaleTimeString());

        // Poll for build changes and reload
        let lastBuildId = null;

        async function checkReload() {
            try {
                const response = await fetch('/_api/build_id');
                if (response.ok) {
                    const buildId = await response.text();
                    if (lastBuildId === null) {
                        lastBuildId = buildId;
                        console.log('📦 Initial build ID: ' + buildId);
                    } else if (lastBuildId !== buildId) {
                        console.log('🔄 Build updated (old: ' + lastBuildId + ', new: ' + buildId + '), reloading...');
                        location.reload();
                    }
                }
            } catch (e) {
                // Server might not be running (production), ignore
            }
        }

        // Check every second
        setInterval(checkReload, 1000);
        checkReload();
    </script>

    <script type="module">
        async function init() {
            try {
                // Load WASM module
                const { default: init, start_renderer } = await import('./pkg/renderer.js');

                // Initialize WASM
                await init();

                // Load layout JSON
                const response = await fetch('/reference/todomvc_dom_layout_700.json');
                if (!response.ok) {
                    throw new Error(`Failed to load layout JSON: ${response.statusText}`);
                }
                const layoutJson = await response.text();

                // Start renderer
                await start_renderer('canvas', layoutJson);
            } catch (error) {
                console.error('Initialization error:', error);
            }
        }

        // Check WebGPU support
        if (!navigator.gpu) {
            console.error('WebGPU not supported. This demo requires WebGPU support. Use Chrome 113+ or Edge 113+');
        } else {
            init();
        }
    </script>
</body>
</html>
