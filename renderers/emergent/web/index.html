<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emergent</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background-color: #f5f5f5;
        }
        canvas {
            display: block;
        }
        .error {
            color: #c00;
            padding: 20px;
            max-width: 500px;
            margin: 20px auto;
            text-align: center;
        }
    </style>
</head>
<body>
    <canvas id="canvas" width="700" height="700"></canvas>
    <div id="error"></div>

    <script type="module">
        async function init() {
            const errorDiv = document.getElementById('error');

            if (!navigator.gpu) {
                errorDiv.innerHTML = '<p class="error">WebGPU not supported</p>';
                return;
            }

            try {
                const { default: init, start_renderer } = await import('./pkg/emergent_renderer.js');
                await init();
                await start_renderer('canvas');
                console.log('Emergent Renderer: Rendering complete');
            } catch (e) {
                console.error('Error:', e);
                errorDiv.innerHTML = `<p class="error">${e.message || e}</p>`;
            }
        }
        init();
    </script>
</body>
</html>
