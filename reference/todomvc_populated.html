<!doctype html>
<html lang="en" data-framework="javascript-es6">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TodoMVC: JavaScript Es6 - Populated State</title>
<link href="app.css" rel="stylesheet">
<body>
<section class="todoapp">
    <header class="header">
        <h1>todos</h1>
        <input class="new-todo" placeholder="What needs to be done?" autofocus/>
    </header>
    <main class="main">
        <div class="toggle-all-container">
            <input class="toggle-all" type="checkbox" id="toggle-all"/>
            <label class="toggle-all-label" for="toggle-all">Mark all as complete</label>
        </div>
        <ul class="todo-list">
            <li data-id="1">
                <div class="view">
                    <input class="toggle" type="checkbox">
                    <label>Buy groceries</label>
                    <button class="destroy"></button>
                </div>
                <input class="edit" value="Buy groceries">
            </li>
            <li data-id="2">
                <div class="view">
                    <input class="toggle" type="checkbox">
                    <label>Walk the dog</label>
                    <button class="destroy"></button>
                </div>
                <input class="edit" value="Walk the dog">
            </li>
            <li data-id="3" class="completed">
                <div class="view">
                    <input class="toggle" type="checkbox" checked>
                    <label>Finish TodoMVC renderer</label>
                    <button class="destroy"></button>
                </div>
                <input class="edit" value="Finish TodoMVC renderer">
            </li>
            <li data-id="4">
                <div class="view">
                    <input class="toggle" type="checkbox">
                    <label>Read documentation</label>
                    <button class="destroy"></button>
                </div>
                <input class="edit" value="Read documentation">
            </li>
        </ul>
    </main>
    <footer class="footer">
        <span class="todo-count"><strong>3</strong> items left</span>
        <ul class="filters">
            <li><a href="#/" class="selected">All</a></li>
            <li><a href="#/active">Active</a></li>
            <li><a href="#/completed">Completed</a></li>
        </ul>
        <button class="clear-completed">Clear completed</button>
    </footer>
</section>
<footer class="info">
    <p>Double-click to edit a todo</p>
    <p>Created by the TodoMVC Team</p>
    <p>Part of <a href="http://todomvc.com">TodoMVC</a></p>
</footer>
</body>
</html>
